name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Determine version
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${REF_NAME}"
          # Strip leading 'v'
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Mark as prerelease if the version contains a hyphen (e.g. v1.2.3-beta.1)
          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive
        shell: bash
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          xcodebuild \
            -scheme ContainerBar \
            -configuration Release \
            -archivePath build/ContainerBar.xcarchive \
            -destination 'generic/platform=macOS' \
            MARKETING_VERSION="${MARKETING_VERSION}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Package .app into zip
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          APP_PATH="build/ContainerBar.xcarchive/Products/Applications/ContainerBar.app"
          if [ ! -d "${APP_PATH}" ]; then
            echo "::error::Archived app not found at ${APP_PATH}"
            ls -la build/ContainerBar.xcarchive/Products/Applications/ || true
            exit 1
          fi
          ZIP_NAME="ContainerBar-${VERSION}.zip"
          ditto -c -k --keepParent "${APP_PATH}" "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Extract CHANGELOG notes
        id: changelog
        uses: release-flow/keep-a-changelog-action@v3
        with:
          command: query
          version: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.release-notes }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
          files: ${{ env.ZIP_NAME }}
