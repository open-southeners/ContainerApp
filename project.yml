name: ContainerApp

options:
  bundleIdPrefix: com.opensoutheners

packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 6.0.0

targets:
  ContainerApp:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - ContainerApp
    dependencies:
      - package: Yams
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.opensoutheners.ContainerApp
        INFOPLIST_FILE: ContainerApp/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ContainerApp/ContainerApp.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ContainerAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: ContainerAppTests
      - path: Fixtures
        buildPhase: resources
        type: folder
    dependencies:
      - target: ContainerApp
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.opensoutheners.ContainerAppTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: ""
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ContainerApp.app/Contents/MacOS/ContainerApp"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ContainerApp:
    build:
      targets:
        ContainerApp: all
        ContainerAppTests: [testing]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ContainerAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
