name: ContainerBar

options:
  bundleIdPrefix: com.opensoutheners

targets:
  ContainerBar:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - ContainerBar
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.opensoutheners.ContainerBar
        INFOPLIST_FILE: ContainerBar/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ContainerBar/ContainerBar.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
